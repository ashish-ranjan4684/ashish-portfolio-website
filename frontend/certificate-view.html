        @view-transition {
            navigation: auto;
        }

        ::view-transition-old(root) {
            animation: view-transition-old 0.5s ease;
        }
        ::view-transition-new(root) {
            animation: view-transition-new 0.5s ease;
        }

        @keyframes view-transition-old {
            to { transform: translateX(-100%); }
        }
        @keyframes view-transition-new {
            from { transform: translateX(100%); }
        }
        @keyframes autoShowy{
            from{
                opacity:0;
                transform: translateY(100px);
            }to{
                opacity:1;
                transform: translateY(0px);
            }
        }
        body{
            background:#111;
            background-image: url("black scrap1.png");
            background-repeat: repeat-y; /* repeat only vertically */
            background-size: 100% auto;
            margin:0;
            padding:2rem;
            min-height:100vh;
        }

        .gallery{
            columns: 3 350px;     /* 3 columns, minimum width 350px */
            column-gap: 2rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        .frame{
            break-inside: avoid;
            margin-bottom: 2rem;

            border: 2rem solid transparent;
            border-image: url("border.png") round;
            border-image-slice: 200;
            border-image-width: 3.2;
            box-sizing: unset;
            animation: autoShowy both;
            animation-timeline: view();
            animation-range:10% 50%;
        }

        .frame img{
            width:100%;
            height:auto;
            display:block;
        }

        .frame img {
