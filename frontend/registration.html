<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tushar Vatsa | Chat</title>
    <link rel="shortcut icon" href="logo3 32.png" type="image/png">
    <link rel="stylesheet" href="registrationStyle.css">
</head>
<body>
    <div class="signup-container">
        <div class="signup-title">
            <div class="title"><img src="logo3 3rem.png" alt="logo" class="logo-title">Tushar Vatsa</div>
            <div class="signup-title-text">Signup to talk with Tushar</div>
        </div>
        <div class="signup-form">
            <div class="signup-name form-internal">
                <input type="text" id="name" name="name" placeholder=" " required>
                <label for="name">Name</label>
            </div>
            <div class="signup-org form-internal">
                <input type="text" id="org" name="org" placeholder=" " required>
                <label for="org">Organization</label>
            </div>
            <div class="signup-email form-internal">
                <input type="email" id="email" name="email" placeholder=" " required>
                <label for="email">Email</label>
            </div>
            <button type="button" id="signup-button">Signup</button>
        </div>
        <div class="signup-login">Already have an account?&ThickSpace;<a href="login.html">Login</a></div>
        <div class="error-msg"></div>
    </div>

    <script>
        document.addEventListener("load",()=>{

        });
        let nameEl = document.getElementById("name");
        let orgEl = document.getElementById("org");
        let emailEl = document.getElementById("email");
        let submitBtn = document.getElementById("signup-button");
        let errorEl = document.querySelector(".error-msg");
        
        nameEl.addEventListener("focusin",()=>{
            if(nameEl.classList.contains("error-border")){
                nameEl.classList.remove("error-border");
            }
        });

        emailEl.addEventListener("focusin",()=>{
            if(nameEl.classList.contains("error-border")){
                nameEl.classList.remove("error-border");
            }
        });

        function checkInput(){
            if(!nameEl.value.trim()){
                nameEl.classList.add("error-border");
                errorEl.innerText = "* You must provide your name";
                return 0;
            }else if(!email.value.trim()){
                emailEl.classList.add("error-border");
                errorEl.textContent = "* You must provide your Email"
                return 0;
            }else{
                return 1;
            }
        }

        function arrayBufferToBase64(buffer) {
            return btoa(String.fromCharCode(...new Uint8Array(buffer)));
        }
        
        submitBtn.addEventListener("click",async()=>{
            if(checkInput()){
                const keyPair = await crypto.subtle.generateKey(
                    {
                        name: "RSASSA-PKCS1-v1_5",
                        modulusLength: 2048,
                        publicExponent: new Uint8Array([1, 0, 1]),
                        hash: "SHA-256"
                    },
                    false, // extractable (needed if you want to store/export)
                    ["sign", "verify"]
                );

                const exportedPublicKey = await crypto.subtle.exportKey(
                    "spki",
                    keyPair.publicKey
                );

                let publicKeyBase64 = arrayBufferToBase64(exportedPublicKey);

            }else return;
        })
    </script>

</body>
</html>
